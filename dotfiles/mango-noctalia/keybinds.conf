# Key Bindings — Omarchy Standard
# ============================================
# key name: refer to `wev` output
# mod keys: super, ctrl, alt, shift, none
# ============================================

# ═══════════════════════════════════════════
# Mango WM — Core
# ═══════════════════════════════════════════
bind = SUPER, r, reload_config
bind = SUPER, q, killclient
bind = SUPER, m, quit
bind = SUPER, slash, spawn, kitty -T btop -e btop

# Noctalia Shell — launcher, control center, settings
bind = SUPER, space, spawn, noctalia msg panel-toggle launcher
bind = SUPER + ALT, space, spawn, noctalia msg panel-toggle control-center
bind = SUPER + SHIFT, comma, spawn, noctalia msg settings-toggle

# ═══════════════════════════════════════════
# Window Focus (Super + Arrows)
# ═══════════════════════════════════════════
bind = SUPER, left, focusdir, left
bind = SUPER, right, focusdir, right
bind = SUPER, up, focusdir, up
bind = SUPER, down, focusdir, down

# ═══════════════════════════════════════════
# Window Movement (Super + Shift + Arrows)
# ═══════════════════════════════════════════
bind = SUPER + SHIFT, left, exchange_client, left
bind = SUPER + SHIFT, right, exchange_client, right
bind = SUPER + SHIFT, up, exchange_client, up
bind = SUPER + SHIFT, down, exchange_client, down
bind = SUPER + CTRL, left, viewtoleft, 0
bind = SUPER + CTRL, right, viewtoright, 0

# ═══════════════════════════════════════════
# Window States
# ═══════════════════════════════════════════
bind = SUPER, f, togglefullscreen
bind = SUPER + SHIFT, f, togglemaximizescreen
bind = SUPER + SHIFT, t, togglefloating
bind = SUPER + SHIFT, o, toggleoverview

# ═══════════════════════════════════════════
# Window Cycling
# ═══════════════════════════════════════════
bind = ALT, Tab, focusstack, next

# ═══════════════════════════════════════════
# Scratchpad
# ═══════════════════════════════════════════
bind = SUPER, s, toggle_scratchpad
bind = SUPER + SHIFT, s , minimized
bind = SUPER + SHIFT + CTRL, s, restore_minimized

# ═══════════════════════════════════════════
# Layout Controls
# ═══════════════════════════════════════════
bind = SUPER + CTRL, l, switch_layout

# ═══════════════════════════════════════════
# Gaps Controls
# ═══════════════════════════════════════════
bind = ALT + SHIFT, X, incgaps,1
bind = ALT + SHIFT, Z, incgaps,-1
bind = ALT + SHIFT, R, togglegaps

# ═══════════════════════════════════════════
# Media Keys (Hardware — via PipeWire)
# ═══════════════════════════════════════════
bind = NONE, XF86AudioRaiseVolume, spawn, noctalia msg volume-up
bind = NONE, XF86AudioLowerVolume, spawn, noctalia msg volume-down
bind = NONE, XF86AudioMute, spawn, noctalia msg volume-mute
bind = NONE, XF86MonBrightnessUp, spawn, noctalia msg brightness-up
bind = NONE, XF86MonBrightnessDown, spawn, noctalia msg brightness-down
bind = NONE, XF86AudioPlay, spawn, noctalia msg media toggle
bind = NONE, XF86AudioNext, spawn, noctalia msg media next
bind = NONE, XF86AudioPrev, spawn, noctalia msg media previous
bind = NONE, XF86AudioMicMute, spawn, noctalia msg mic-mute
bind = NONE, XF86Calculator, spawn, gnome-calculator
bind = NONE, Print, spawn, noctalia msg screenshot-region
bind = SUPER + SHIFT, Print, spawn, noctalia msg screenshot-fullscreen

# ═══════════════════════════════════════════
# Workspace Navigation (Super + 1-9)
# ═══════════════════════════════════════════
bind = SUPER, 1, view,1,0
bind = SUPER, 2, view,2,0
bind = SUPER, 3, view,3,0
bind = SUPER, 4, view,4,0
bind = SUPER, 5, view,5,0
bind = SUPER, 6, view,6,0
bind = SUPER, 7, view,7,0
bind = SUPER, 8, view,8,0
bind = SUPER, 9, view,9,0

# ═══════════════════════════════════════════
# Move Window to Workspace (Super + Shift + 1-9)
# ═══════════════════════════════════════════
bind = SUPER + SHIFT, 1, tag,1,0
bind = SUPER + SHIFT, 2, tag,2,0
bind = SUPER + SHIFT, 3, tag,3,0
bind = SUPER + SHIFT, 4, tag,4,0
bind = SUPER + SHIFT, 5, tag,5,0
bind = SUPER + SHIFT, 6, tag,6,0
bind = SUPER + SHIFT, 7, tag,7,0
bind = SUPER + SHIFT, 8, tag,8,0
bind = SUPER + SHIFT, 9, tag,9,0

# ═══════════════════════════════════════════
# Multi-Monitor
# ═══════════════════════════════════════════
bind = SUPER + CTRL + ALT, Tab, focusstack, next
bind = SUPER + CTRL + ALT, left, focusmon, left
bind = SUPER + CTRL + ALT, right, focusmon, right
bind = SUPER + CTRL + ALT, up, focusmon, up
bind = SUPER + CTRL + ALT, down, focusmon, down
bind = SUPER + CTRL + ALT + SHIFT, left, tagmon, left
bind = SUPER + CTRL + ALT + SHIFT, right, tagmon, right
bind = SUPER + CTRL + ALT + SHIFT, up, tagmon, up
bind = SUPER + CTRL + ALT + SHIFT, down, tagmon, down

# ═══════════════════════════════════════════
# Resize Windows
# ═══════════════════════════════════════════
bind = CTRL + ALT, up, resizewin,+0,-50
bind = CTRL + ALT, down, resizewin,+0,+50
bind = CTRL + ALT, left, resizewin,-50,+0
bind = CTRL + ALT, right,resizewin,+50,+0

# ═══════════════════════════════════════════
# Move Windows (floating)
# ═══════════════════════════════════════════
bind = CTRL + SHIFT, up, movewin,+0,-50
bind = CTRL + SHIFT, down, movewin,+0,+50
bind = CTRL + SHIFT, left, movewin,-50,+0
bind = CTRL + SHIFT, right, movewin,+50,+0

# ═══════════════════════════════════════════
# App Launchers
# ═══════════════════════════════════════════
bind = SUPER, Return, spawn, kitty
bind = SUPER, e, spawn, nautilus
bind = SUPER, z, spawn, zen-browser
bind = SUPER, b, spawn, zen-browser
bind = SUPER, n, spawn, zeditor
bind = SUPER, h, spawn, localsend
bind = SUPER, t, spawn, Telegram
bind = SUPER + SHIFT, c, spawn, gnome-calculator

# ═══════════════════════════════════════════
# Mouse Bindings
# ═══════════════════════════════════════════
mousebind = NONE, btn_middle, togglemaximizescreen
mousebind = SUPER, btn_left, moveresize,curmove
mousebind = SUPER, btn_right, moveresize,curresize

# ═══════════════════════════════════════════
# Scroll Bindings
# ═══════════════════════════════════════════
axisbind = SUPER, UP, viewtoleft_have_client
axisbind = SUPER, DOWN, viewtoright_have_client
