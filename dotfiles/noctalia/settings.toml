[audio]
enable_overdrive = true
enable_sounds = true
notification_sound = "/home/mindset/.config/noctalia/sounds/volume-change.wav"
sound_volume = 0.99999997764825821
volume_change_sound = "/home/mindset/.config/noctalia/sounds/volume-change.wav"

[bar]
order = [ "Mindset" ]

    [bar.Mindset]
    background_opacity = 0.4999999888241291
    center = [ "workspaces", "audio_visualizer", "media" ]
    contact_shadow = true
    end = [
        "tray",
        "screenshot",
        "recorder",
        "notifications",
        "clipboard",
        "bluetooth",
        "network",
        "volume",
        "battery",
        "control-center",
        "session"
    ]
    font_family = "Comic Sans MS"
    font_weight = 400
    margin_ends = 10
    padding = 10
    start = [ "launcher", "clock", "cpu", "temp", "ram", "privacy" ]
    thickness = 30
    widget_spacing = 8

[brightness]
enable_ddcutil = true
minimum_brightness = 0.099999997764825821

[calendar]
refresh_minutes = 60

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "dark_mode"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "power_profile"

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 8
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 5

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 900

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 1200

[location]
auto_locate = true
latitude = -6.9088900000000004
longitude = 108.48972000000001
sunrise = "06:00"
sunset = "18:00"

[lockscreen]
blur_intensity = 0.0
wallpaper = "/home/mindset/Pictures/Wallpapers/自由阶梯.JPG"

