[notification]
background_opacity = 0.4999999888241291
layer = "overlay"
scale = 0.80000000447034836

[osd]
background_opacity = 0.4999999888241291
position = "bottom_center"
scale = 0.80000000447034836

[plugin_settings."noctalia/screen_recorder"]
audio_codec = "aac"
color_range = "full"
quality = "ultra"
video_source = "focused"

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/translator" ]

[shell]
avatar_path = "/var/lib/AccountsService/icons/mindset"
clipboard_image_action_command = "grim -g \"$(slurp)\" - | satty -f-"
font_family = "Comic Sans MS"
password_style = "random"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true

    [shell.panel]
    clipboard_placement = "floating"
    control_center_placement = "floating"
    launcher_placement = "floating"
    launcher_sort_by_usage = false
    open_near_click_clipboard = true
    open_near_click_control_center = true
    open_near_click_launcher = true
    session_placement = "centered"
    transparency_mode = "glass"
    wallpaper_placement = "centered"

[system.monitor]
gpu_poll_seconds = 2
network_poll_seconds = 2

[theme]
community_palette = "GitHub Dark"
mode = "dark"
source = "community"
wallpaper_scheme = "m3-rainbow"

    [theme.templates]
    builtin_ids = [ "btop", "cava", "foot", "gtk3", "gtk4", "hyprland", "qt" ]
    community_ids = [ "zen-browser", "neovim", "zed", "rofi", "steam", "telegram", "yazi", "hyprtoolkit" ]

[wallpaper]
fill_mode = "stretch"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/mindset/Pictures/Wallpapers/111224 v2.png"

    [wallpaper.last]
    path = "/home/mindset/Pictures/Wallpapers/111224 v2.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/mindset/Pictures/Wallpapers/111224 v2.png"

[weather]
refresh_minutes = 5

[widget.audio_visualizer]
bands = 50
color_2 = "secondary"
show_when_idle = true
width = 100.0

[widget.clock]
format = "{:%H:%M:%S}"

[widget.cpu]
stat = "cpu_temp"

[widget.launcher]
glyph = "brand-apple-filled"

[widget.privacy]
hide_inactive = true

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.spacer_2]
type = "spacer"

[widget.temp]
stat = "gpu_temp"